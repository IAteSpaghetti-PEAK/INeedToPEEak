# Thunderstore CLI (tcli) config, used by the release workflow to auto-publish.
# The zip's own manifest.json is authoritative for version/deps; the workflow
# passes --package-version explicitly.

[config]
schemaVersion = "0.0.1"

[package]
namespace = "IAteSpaghetti"
name = "INeedToPEEak"
versionNumber = "0.0.0" # overridden with --package-version at publish time
description = "Bathroom needs for PEAK. Fully multiplayer-synced."
websiteUrl = "https://github.com/IAteSpaghetti-PEAK/INeedToPEEak"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_PEAK = "5.4.75301"

[publish]
repository = "https://thunderstore.io"
communities = ["peak"]
