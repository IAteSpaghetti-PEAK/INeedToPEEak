name: Release

# Pushing a tag like v0.1.1 publishes a GitHub release with the files from
# release-assets/. The release is authored by github-actions[bot].
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "INeedToPEEak $GITHUB_REF_NAME" \
            --notes-file thunderstore/CHANGELOG.md
